<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>My Simple Page</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f0f0;
            margin-top: 100px;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
            color: #555;
        }
    </style>
</head>

<body>

    <h1>Welcome 👋</h1>

    <button onclick="showMessage()"> Click here </button>

    <p id="message"></p>

    <script>
        function showMessage() {
            document.getElementById("message").innerText = " Hello , How are you !! 🎉";
        }
    </script>

</body>
</html>
